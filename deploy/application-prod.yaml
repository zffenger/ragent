# ========================================
# Ragent 生产环境配置模板
# ========================================
# 使用说明：
# 1. 复制此文件为 application-prod.yaml
# 2. 修改配置项中的占位符为实际值
# 3. 此配置会覆盖 application.yaml 中的同名配置
# ========================================

server:
  port: ${APP_PORT:9090}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME:ragent}?client_encoding=UTF8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

# ========================================
# AI 服务配置
# ========================================
ai:
  providers:
    # 百炼（阿里云）
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}

    # SiliconFlow
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}

    # 本地 Ollama
    ollama:
      url: ${OLLAMA_URL:http://localhost:11434}

  # 默认聊天模型
  chat:
    default-model: ${DEFAULT_CHAT_MODEL:qwen3-max}
    deep-thinking-model: ${DEEP_THINKING_MODEL:qwen3-max}

  # 默认 Embedding 模型
  embedding:
    default-model: ${DEFAULT_EMBED_MODEL:qwen-emb-8b}

  # 默认 Rerank 模型
  rerank:
    default-model: ${DEFAULT_RERANK_MODEL:qwen3-rerank}

# ========================================
# 存储配置
# ========================================
storage:
  type: ${STORAGE_TYPE:local}
  local:
    base-path: ${STORAGE_PATH:./storage}

# 阿里云 OSS（当 storage.type=oss 时启用）
# aliyun:
#   oss:
#     endpoint: ${ALIYUN_OSS_ENDPOINT:}
#     access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
#     access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
#     bucket-name: ${ALIYUN_OSS_BUCKET:}

# ========================================
# 飞书 OAuth 配置
# ========================================
feishu:
  oauth:
    enabled: ${FEISHU_OAUTH_ENABLED:false}
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}

# ========================================
# 机器人配置
# ========================================
chatbot:
  enabled: ${CHATBOT_ENABLED:false}
  detection:
    mode: COMPOSITE
  answer:
    mode: RAG

# ========================================
# MCP 服务器配置
# ========================================
rag:
  mcp:
    servers:
      - name: default
        url: ${MCP_SERVER_URL:http://localhost:9099}

# ========================================
# Sa-Token 配置
# ========================================
sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid

# ========================================
# 应用配置
# ========================================
app:
  # 环境变量自动校验（推荐开启）
  # 自动扫描配置中 ${VAR} 格式的环境变量引用，未设置则快速失败
  env-validation-enabled: true
